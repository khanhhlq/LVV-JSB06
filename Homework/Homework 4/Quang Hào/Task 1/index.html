<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="trang-chinh">
        <img src="CyStore Logo.png" alt="Logo" class="logo-image">
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
            <a href="#">Login/Register</a>
        </nav>
    </header>
    <main>
        <h1>🛒 Home</h1>
        <div class="product-container">
            <div class="product-card">
                <div class="image-container">
                    <img src="https://cdn.hstatic.net/products/200001048320/1dac6362-8ee7-4cb8-833c-05d11a04105b_57ec8d46e3a244f298379418a59d5531_grande.jpg" alt="No image">
                    <button class="buy-btn">Buy</button>
                </div>
                <div class="product-info">
                    <p class="product-name">Special Week-Plushie</p>
                    <p class="product-price">800.000đ</p>
                </div>
            </div>
            <div class="product-card">
                <div class="image-container">
                    <img src="https://cdn.hstatic.net/products/200001048320/figure-192082_01_f2c8965fb37d4d269d36b78a897632f4_grande.jpg" alt="No image">
                    <button class="buy-btn">Buy</button>
                </div>
                <div class="product-info">
                    <p class="product-name">Chakura Chiyono-Figure</p>
                    <p class="product-price">1.400.000đ</p>
                </div>
            </div>
            <div class="product-card">
                <div class="image-container">
                    <img src="https://cdn.hstatic.net/products/200001048320/keychain_9aea5be12cb04ed798e56b1cf2a769c9_grande.jpg" alt="No image">
                    <button class="buy-btn">Buy</button>
                </div>
                <div class="product-info">
                    <p class="product-name">Okawa Bukubu World Uma Musume-Merch</p>
                    <p class="product-price">1.090.000đ</p>
                </div>
            </div>
            <div class="product-card">
                <div class="image-container">
                    <img src="https://cdn.hstatic.net/products/200001048320/571658796_122219499818317317_7062405221434380182_n_f01f1877666e41ca9eaf3d901322e6bd_grande.jpg" alt="No image">
                    <button class="buy-btn">Buy</button>
                </div>
                <div class="product-info">
                    <p class="product-name">Fujimasa March-Nendoroid</p>
                    <p class="product-price">1.000.000đ</p>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
