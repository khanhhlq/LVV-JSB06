<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Bán Hàng Của Tôi</title>
    <!-- 1. PHẢI THÊM: Dòng kết nối file CSS phía dưới -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Khung chứa toàn bộ các sản phẩm -->
    <div class="product-container">
        
        <!-- Sản phẩm 1 -->
        <div class="product-card">
            <div class="product-image-wrapper">
                <img src="https://picsum.photos" alt="Giày Thể Thao" class="product-image">
                <button class="buy-now-btn">Mua ngay</button>
            </div>
            <div class="product-info">
                <h3 class="product-name">Giày Thể Thao Nam</h3>
                <p class="product-price">500.000 đ</p>
            </div>
        </div>

        <!-- 2. NÊN THÊM: Sao chép đoạn này để có thêm sản phẩm 2 -->
        <div class="product-card">
            <div class="product-image-wrapper">
                <img src="https://picsum.photos" alt="Áo Khoác" class="product-image">
                <button class="buy-now-btn">Mua ngay</button>
            </div>
            <div class="product-info">
                <h3 class="product-name">Áo Khoác Bomber</h3>
                <p class="product-price">350.000 đ</p>
            </div>
        </div>

    </div>

</body>
</html>
