<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang bán hàng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Trang bán hàng</h1>

    <div class="container">

        <div class="card">
            <img src="https://picsum.photos/300/200" alt="Sản phẩm">

            <div class="info">
                <h3>Tai nghe Bluetooth</h3>
                <p>Âm thanh chất lượng cao, pin 20 giờ.</p>
                <p class="price">499.000đ</p>
            </div>

            <button class="buy-btn">Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/301/200" alt="Sản phẩm">

            <div class="info">
                <h3>Chuột Gaming</h3>
                <p>Thiết kế đẹp, độ nhạy cao.</p>
                <p class="price">299.000đ</p>
            </div>

            <button class="buy-btn">Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/302/200" alt="Sản phẩm">

            <div class="info">
                <h3>Bàn phím cơ</h3>
                <p>LED RGB nhiều chế độ.</p>
                <p class="price">799.000đ</p>
            </div>

            <button class="buy-btn">Mua ngay</button>
        </div>

    </div>

</body>
</html>
